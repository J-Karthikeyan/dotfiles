scan_timeout = 100
command_timeout = 500
add_newline = false

format = """
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character\
"""

right_format = """
$all
"""

palette = "jetbrains"

[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 4

[character]
disabled = false
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[: ](bold yellow)"

[line_break]
disabled = true

# Git remote URL symbol (github/gitlab/etc) with darker background
[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="\uf408"
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="\uf296"
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="\uf171"
else
    GIT_REMOTE_SYMBOL="\uf1d3"
fi
echo "$GIT_REMOTE_SYMBOL"
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output  "
require_repo = true
ignore_timeout = true

# Git branch with darker powerline-style border (using crust for darker bg)
[git_branch]
symbol = "\uf418 "
style = "fg:lavender bg:crust"
format = "[](crust)[$symbol$branch]($style)[](crust)"

# Detailed git status
[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
staged = "[+${count} ](green)"
modified = "[!${count} ](yellow)"
renamed = "[»${count} ](sapphire)"
deleted = "[-${count} ](red)"
untracked = "[?${count} ](sapphire)"
stashed = "[≡${count} ](mauve)"
conflicted = "[✖${count} ](red bold)"
ahead = "[⇡${count} ](teal)"
behind = "[⇣${count} ](peach)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"

# Git worktree indicator
[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
    common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
    git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
    if [ "$common_dir" != "$git_dir" ]; then
        echo "⛓ "
    fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

# Git state (during rebasing, merging, etc)
[git_state]
format = '[($state ](bold yellow)[$progress_current/$progress_total)](bold yellow)'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"

# Minimal language/config modules (no icons, just versions when needed)
[package]
disabled = true

[python]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[git_metrics]
disabled = true

[conda]
symbol = "@"
format = "[ $symbol$environment ](dimmed green)"

[palettes.jetbrains]
# --- background ---
crust = "#2B2D30"
mantle = "#2B2D30"
base = "#2B2D30"

surface0 = "#393B40"
surface1 = "#43454A"
surface2 = "#4E5156"

overlay0 = "#707379"
overlay1 = "#868A91"
overlay2 = "#9AA5CE"

# --- text ---
text = "#BCBEC4"
subtext0 = "#CED0D6"
subtext1 = "#DFE1E5"

# --- accents jetbrains ---
rosewater = "#F5E0DC"
flamingo = "#F2CDCD"
pink = "#F5C2E7"
mauve = "#CBA6F7"
red = "#F75464"
maroon = "#E0AF68"
peach = "#D19A66"
yellow = "#D19A66"
green = "#6EA368"
teal = "#94E2D5"
sky = "#7DCFFF"
sapphire = "#74C7EC"
blue = "#3877E9"
lavender = "#E3C97C"
