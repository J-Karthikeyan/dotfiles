set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix: Keep Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Seamless navigation with vim-tmux-navigator (no prefix needed)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Window management
bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# Vim-style splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Start from window index 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Mouse and performance
set -g mouse on
set -g escape-time 0
set -g focus-events on
setw -g aggressive-resize on
set -g allow-passthrough on
set -s set-clipboard on
setw -g mode-keys vi

# =============================================================================
# Catppuccin plugin + JetBrains IDE New Dark palette override
# =============================================================================
# Strategy: set @thm_* vars BEFORE catppuccin loads. Catppuccin's theme file
# uses `set -ogq` (only-set-if-unset), so our values win. The flavor still
# needs to be declared so the plugin knows which theme file to source (even
# though ours overrides its colors).
#
# JetBrains IDE New Dark palette mapping:
set -g @thm_bg        "#191A1C"
set -g @thm_fg        "#BCBEC4"
set -g @thm_crust     "#111113"
set -g @thm_mantle    "#1E1F22"
set -g @thm_surface_0 "#2B2D30"
set -g @thm_surface_1 "#393B40"
set -g @thm_surface_2 "#4E5157"
set -g @thm_overlay_0 "#595959"
set -g @thm_overlay_1 "#6B6F76"
set -g @thm_overlay_2 "#8F9299"
set -g @thm_subtext_0 "#A8ABB0"
set -g @thm_subtext_1 "#CED0D6"
# Accents (JetBrains-flavored)
set -g @thm_rosewater "#E6C4B8"
set -g @thm_flamingo  "#E8B4B4"
set -g @thm_pink      "#E8A4D4"
set -g @thm_mauve     "#C092FA"
set -g @thm_red       "##F27481"
set -g @thm_maroon    "##FF8A95"
set -g @thm_peach     "##D19A66"
set -g @thm_yellow    "#E0CE70"
set -g @thm_green     "#6BCC62"
set -g @thm_teal      "#47CCBD"
set -g @thm_sky       "#6BC5C5"
set -g @thm_sapphire  "#5AA7E4"
set -g @thm_blue      "#5594FA"
set -g @thm_lavender  "#C5B7F5"

# Catppuccin options
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Per-module overrides
# Application: use code icon instead of default person/child
set -g @catppuccin_application_icon " "
# CPU: orange (JB peach) instead of default yellow. Literal hex so catppuccin's
# `-ogq` check sees the option as set and skips its own default.
set -g @catppuccin_cpu_color "##D19A66"

# Transparent status bar (uses terminal bg instead of @thm_mantle)
# Bar bg matches terminal bg (#191A1C) so it looks transparent while
# keeping window-tab rounded separators functional.
set -g @catppuccin_status_background "#191A1C"

# Remove grey surface_0 box from right-side module text — text sits on bar bg
set -g @catppuccin_status_module_text_bg "#191A1C"

# Load catppuccin plugin
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status bar — pinned to TOP
set -g status-position top
set -g status-interval 5
set -g status 2
set -g status-format[1] '#[fill=#2B2D30]'  # thin separator row between bar and pane
set -g status on
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 200
set -g status-left " "

# Right-side modules (catppuccin's built-in module formats)
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag  status-right "#{E:@catppuccin_status_session}"
set -ag  status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Load CPU and battery plugins (provide #{cpu_percentage}, #{ram_percentage},
# #{battery_percentage} formats consumed by the catppuccin modules above).
run ~/.tmux/plugins/tmux-cpu/cpu.tmux
run ~/.tmux/plugins/tmux-battery/battery.tmux

# Pane borders (keep JetBrains feel, no top title bar)
set -g pane-border-lines single
set -g pane-border-style 'fg=#393B40'
set -g pane-active-border-style 'fg=#C092FA'
set -g pane-border-status off

# =============================================================================
# F12 nested session toggle
# =============================================================================
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=#BCBEC4,bg=default" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setqc=\E[58:2::%p1%{65536}%/%d:%p1%{256}%/%{255}%&%d:%p1%{255}%&%d%;m'

# Last window shortcut
bind-key a last-window

# Unbind defaults
unbind %
unbind '"'

# Resize panes
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# =============================================================================
# TMUX PRODUCTIVITY ENHANCEMENTS
# =============================================================================

# --- Floating popups ---
bind-key -n M-\\ popup -E -w 80% -h 80% -d "#{pane_current_path}" "TMUX_POPUP=1 $SHELL"
bind-key -n "M-g" popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"
bind-key -n "M-f" run-shell "~/.config/tmux/tmux-sessionizer"
bind-key -n "M-t" popup -E -w 80% -h 80% "btop"
bind-key -n "M-d" popup -E -w 80% -h 80% -d "#{pane_current_path}" "~/.config/tmux/tmux-file-picker"
bind-key -n "M-c" popup -E -w 80% -h 80% -d "#{pane_current_path}" "$EDITOR /tmp/scratch.md"
bind-key -n "M-b" popup -E -w 80% -h 80% -d "#{pane_current_path}" "TMUX_POPUP=1 $SHELL"

# --- Quick actions ---
bind-key -n M-z resize-pane -Z
bind-key -n M-k kill-pane
bind-key -n M-r source-file ~/.tmux.conf \; display-message "Config reloaded"
bind-key -n M-w choose-tree -Zw -O name

# --- Window navigation (opt + 1-9) ---
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# --- Window cycling (opt + [ / ]) ---
bind-key -n M-[ previous-window
bind-key -n M-] next-window

# --- Session cycling (opt + shift + [ / ]) ---
bind-key -n M-'{' switch-client -p
bind-key -n M-'}' switch-client -n

# --- Prefix bindings ---
bind-key z resize-pane -Z
bind-key S setw synchronize-panes
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key R command-prompt -I "#S" "rename-session '%%'"
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1
bind-key m command-prompt -p "move pane to window:" "join-pane -t '%%'"
bind-key b break-pane
bind-key / copy-mode \; send-keys ?
bind-key M select-pane -m
bind-key J join-pane
bind-key t set-option status
bind-key X kill-window
bind-key Q kill-pane
bind-key L command-prompt -p "link window from [session]:window" "link-window -s '%%' -a"

# =============================================================================
# PLUGINS (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'Ataraxy-Labs/opensessions'

run '~/.tmux/plugins/tpm/tpm'

# =============================================================================
# COPY MODE IMPROVEMENTS
# =============================================================================

# Enter copy mode with prefix+[
bind-key [ copy-mode

# Use vim keys in copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'Escape' send -X cancel
bind-key -T copy-mode-vi 'H' send -X start-of-line
bind-key -T copy-mode-vi 'L' send -X end-of-line

# Search and jump (like / in vim)
bind-key -T copy-mode-vi '/' command-prompt -i -p "search down:" "send -X search-forward-incremental '%%'"
bind-key -T copy-mode-vi '?' command-prompt -i -p "search up:" "send -X search-backward-incremental '%%'"

# =============================================================================
# SESSION MANAGEMENT
# =============================================================================

# Better session switcher with preview
bind-key -n M-s choose-tree -Zs -O name
bind-key -n M-n command-prompt -p "New session name:" "new-session -A -s '%%'"
bind-key -n M-a switch-client -l

# Quick project session - prompts for path
bind-key -n M-p command-prompt -p "Project path:" "new-session -A -s '%%' -c '%%'"

# History
set -g history-limit 50000
