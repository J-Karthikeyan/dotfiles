set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix: Keep Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window management
bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# Vim-style splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Start from window index 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Mouse and performance
set -g mouse on
set -g escape-time 0
set -g focus-events on
setw -g aggressive-resize on
set -g allow-passthrough on
set -s set-clipboard on
setw -g mode-keys vi

# =============================================================================
# JetBrains IDE New Dark Theme
# Background: #191A1C, Foreground: #BCBEC4
# Magenta: #C092FA, Blue: #5594FA, Green: #6BCC62
# Yellow: #E0CE70, Red: #F27481, Cyan: #47CCBD
# Gray: #4E5157
# =============================================================================
set -g status-position bottom
set -g status-interval 1
set -g status-justify left

# Status bar - matching IDE theme
set -g status-style 'bg=#191A1C,fg=#BCBEC4'
set -g status-left-length 40
set -g status-right-length 40

# Left: Session name (magenta accent)
set -g status-left '#[fg=#191A1C,bg=#C092FA,bold] #S #[fg=#C092FA,bg=#191A1C]'

# Right: Time only
set -g status-right '#[fg=#4E5157,bg=#191A1C] %H:%M '

# Window status - compact
setw -g window-status-separator ''
setw -g window-status-format '#[fg=#4E5157,bg=#191A1C] #I:#W '
setw -g window-status-current-format '#[fg=#C092FA,bg=#191A1C,bold] #I:#W '

# Pane borders - subtle
set -g pane-border-lines single
set -g pane-border-style 'fg=#2B2D30'
set -g pane-active-border-style 'fg=#C092FA'

# Message style
set -g message-style 'bg=#25324D,fg=#BCBEC4'
set -g message-command-style 'bg=#25324D,fg=#E0CE70'

# Window bell
setw -g window-status-bell-style 'fg=#191A1C,bg=#F27481,bold'

# =============================================================================
# F12 nested session toggle
# =============================================================================
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=#BCBEC4,bg=#25324D" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setqc=\E[58:2::%p1%{65536}%/%d:%p1%{256}%/%{255}%&%d:%p1%{255}%&%d%;m'

# Last window shortcut
bind-key a last-window

# Unbind defaults
unbind %
unbind '"'

# Resize panes
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# =============================================================================
# TMUX PRODUCTIVITY ENHANCEMENTS
# =============================================================================

# Popup window for quick commands (like a floating terminal)
bind-key -n M-\\ popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"
bind-key -n "M-g" popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"
bind-key -n "M-f" run-shell "~/.config/tmux/tmux-sessionizer"

# Zoom pane (maximize/restore)
bind-key z resize-pane -Z
bind-key -n M-z resize-pane -Z

# Synchronize panes (send input to all panes)
bind-key S setw synchronize-panes

# Rename window/session easily
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key R command-prompt -I "#S" "rename-session '%%'"

# Swap windows
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1

# Move pane to window
bind-key m command-prompt -p "move pane to window:" "join-pane -t '%%'"

# Break pane into new window
bind-key b break-pane

# Search in scrollback
bind-key / copy-mode \; send-keys ?

# Quick mark and jump to pane
bind-key M select-pane -m
bind-key J join-pane

# Toggle status bar
bind-key t set-option status

# Kill window/pane without confirmation
bind-key X kill-window
bind-key Q kill-pane

# Link window from another session
bind-key L command-prompt -p "link window from [session]:window" "link-window -s '%%' -a"

# =============================================================================
# COPY MODE IMPROVEMENTS
# =============================================================================

# Enter copy mode with prefix+[
bind-key [ copy-mode

# Use vim keys in copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'Escape' send -X cancel
bind-key -T copy-mode-vi 'H' send -X start-of-line
bind-key -T copy-mode-vi 'L' send -X end-of-line

# Search and jump (like / in vim)
bind-key -T copy-mode-vi '/' command-prompt -i -p "search down:" "send -X search-forward-incremental '%%'"
bind-key -T copy-mode-vi '?' command-prompt -i -p "search up:" "send -X search-backward-incremental '%%'"

# =============================================================================
# SESSION MANAGEMENT
# =============================================================================

# Better session switcher with preview
bind-key -n M-s choose-tree -Zs -O name

# Quick project session - prompts for path
bind-key -n M-p command-prompt -p "Project path:" "new-session -A -s '%%' -c '%%'"
